<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sana Business Solutions</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fa;
}

/* NAVBAR */
nav {
    background: rgba(10, 37, 64, 0.95);
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
}

nav h2 {
    letter-spacing: 1px;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    transition: 0.3s;
}

nav a:hover {
    color: #00bfff;
}

/* HERO SECTION */
.hero {
    height: 90vh;
    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url("banner.png") center/cover no-repeat;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    color: white;
    animation: fadeIn 1.5s ease;
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 10px;
    animation: slideUp 1s ease;
}

.hero p {
    font-size: 18px;
    margin-bottom: 20px;
    animation: fadeIn 2s ease;
}

.hero button {
    padding: 12px 25px;
    border: none;
    background: #007bff;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

.hero button:hover {
    background: #0056b3;
    transform: scale(1.08);
}

/* TEAM SECTION */
.container {
    padding: 50px 20px;
    text-align: center;
}

.container h2 {
    margin-bottom: 30px;
    font-size: 30px;
}

.team {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: white;
    width: 230px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-12px) scale(1.05);
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    border-radius: 10px;
    transition: 0.4s;
}

.card:hover img {
    transform: scale(1.1);
}

.card h3 {
    margin: 10px 0 5px;
}

.card p {
    color: gray;
}

/* FOOTER */
footer {
    background: #0a2540;
    color: white;
    text-align: center;
    padding: 15px;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {
        transform: translateY(40px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>SanaBiz</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Team</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>We Build Smart Business Solutions</h1>
    <p>Helping companies grow with innovation and strategy</p>
    <button>Get Started</button>
</section>

<!-- TEAM -->
<section class="container">
    <h2>Meet Our Team</h2>

    <div class="team">
        <div class="card">
            <img src="team1.jpg" alt="">
            <h3>Sana</h3>
            <p>Marketing Lead</p>
        </div>

        <div class="card">
            <img src="team2.jpg" alt="">
            <h3>Ali</h3>
            <p>Project Manager</p>
        </div>

        <div class="card">
            <img src="team3.jpg" alt="">
            <h3>Ahmed</h3>
            <p>Developer</p>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Sana Business Solutions</p>
</footer>

</body>
</html>
```
